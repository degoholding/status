# Cấu hình Repository
owner: degoholding
repo: status

delay: 2000 
skipDeleteIssues: true

# Tự động gán người xử lý chung nếu có sự cố
assignees:
  - mrcuongdegoholding
  - pltgiang
  - degoholding

# Danh sách các website/API cần theo dõi
sites:
  # === NHÓM 1: HỆ THỐNG CỐT LÕI CỦA DEGO HOLDING ===
  - name: Dego Holding App
    url: https://app.degoholding.vn/
    maxResponseTime: 8000
    
  - name: Dego Holding Homepage
    # Đã chuyển về HTTPS. Thêm header User-Agent để mô phỏng trình duyệt, giúp né lỗi 415 và bypass WAF
    url: https://degoholding.com

  - name: Mesa Message Gateway (API)
    url: https://api-mesa.degoholding.vn
    method: GET
    expectedStatusCodes: [200, 400, 401, 403, 404]
    maxResponseTime: 5000
    
  - name: Mesa Dashboard (Quản trị)
    url: https://mesa.degoholding.vn
    
  - name: My Firebase API (Core Backend)
    url: https://api.degoholding.vn
    expectedStatusCodes: [200, 400, 401, 403, 404, 405]
    maxResponseTime: 5000

  # === NHÓM 2: CÁC CÔNG TY THÀNH VIÊN ===
  # Đã chuyển tất cả các trang WP sang HTTPS và thêm Header để bypass WAF chặn bot
  - name: ABA Chemical
    url: https://abachemical.com
    
  - name: AGC Việt Nam
    url: https://agcvietnam.com.vn
    
  - name: IDA Global
    url: https://idaglobal.com.vn
    
  - name: iCare Pharma
    url: https://icarepharma.com.vn
    
  - name: Dr. Xanh
    url: https://drxanh.com
    
  - name: N2 Agro
    url: https://n2agro.vn

# Cấu hình giao diện Trang Status
status-website:
  cname: status.degoholding.vn
  logoUrl: https://degoholding.com/wp-content/uploads/2023/08/DEGO-HOLDING-LOGO.png
  name: Dego Holding Status
  introTitle: "**Trạng thái hệ thống các dịch vụ của Dego Holding.**"
  introMessage: Trang web này cung cấp dữ liệu theo thời gian thực về tình trạng hoạt động của các hệ thống nội bộ và website công ty thành viên. Tự động kiểm tra.
  theme: light
  
  navbar:
    - title: Trạng thái
      href: /
    - title: Trang chủ Dego
      href: https://degoholding.vn/
    - title: App Nội bộ
      href: https://app.degoholding.vn/

# Cấu hình ngôn ngữ tiếng Việt
i18n:
  activeIncidents: Cảnh báo đang diễn ra
  allSystemsOperational: Tất cả hệ thống hoạt động bình thường
  incidentReport: "Báo cáo sự cố #$NUMBER"
  activeIncidentSummary: Mở lúc $DATE với $POSTS tin nhắn cập nhật.
  down: Sập mạng
  up: Hoạt động bình thường
  degraded: Suy giảm hiệu năng
  outage: Ngừng hoạt động
  responseTime: Thời gian phản hồi
  uptime: Thời gian hoạt động (Uptime)
  api: API
  overallUptime: "Uptime tổng thể: $UPTIME"
